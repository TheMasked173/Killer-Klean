<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Quote | Killer Klean</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">KILLER KLEAN</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="quote.html">Free Quote</a></li>
        </ul>
    </nav>
</header>

<section class="quote-page">
    <div class="quote-container">
        <h1>Get Your Free Quote</h1>
        <p>Fill out the form below.</p>

        <form class="quote-form" action="https://formsubmit.co/chillybubs@gmail.com" method="POST">

            <input type="hidden" name="_subject" value="New Killer Klean Quote Request">
            <input type="hidden" name="_captcha" value="false">

            <label>Full Name</label>
            <input type="text" name="fullName" required>

            <label>Phone Number</label>
            <input type="tel" name="phone" required>

            <label>Email</label>
            <input type="email" name="email">

            <label>Address</label>
            <input type="text" name="address" required>

            <label>Select Services</label>

            <div class="checkbox-group">
                <label><input type="checkbox" name="services[]" value="Window Cleaning"> Window Cleaning</label>
                <label><input type="checkbox" name="services[]" value="Concrete Cleaning"> Concrete Cleaning</label>
                <label><input type="checkbox" name="services[]" value="Stone Cleaning"> Stone Cleaning</label>
                <label><input type="checkbox" name="services[]" value="Building Exterior Cleaning"> Building Exterior Cleaning</label>
                <label><input type="checkbox" name="services[]" value="Pool Patio Cleaning"> Pool Patio Cleaning</label>
                <label><input type="checkbox" name="services[]" value="House Exterior Cleaning"> House Exterior Cleaning</label>
            </div>

            <label>Additional Details</label>
            <textarea name="details" rows="5"></textarea>

            <button type="submit" class="btn">Submit Request</button>

        </form>
    </div>
</section>

<footer>
    <p>Killer Klean Exterior Cleaning</p>
</footer>

<script src="script.js"></script>
</body>
</html>
